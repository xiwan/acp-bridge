# ACP Bridge — Message Templates
#
# All webhook and status messages are defined here.
# Edit this file to change message format, then restart Bridge.
# Variables use {name} placeholders (Python str.format).
#
# ./bridge-ctl.sh restart

# ── Pipeline ──────────────────────────────────────
pipeline:
  start: "🔗 **Pipeline** `{id}` started: {flow}"
  step_ok: "🔗 `{id}` ✅ Step {idx}/{total}: **{agent}** ({dur}s)\n{preview}"
  step_fail: "🔗 `{id}` ❌ Step {idx}/{total}: **{agent}** ({dur}s)\n{error}"
  done_ok: "🔗 **Pipeline** `{id}` ✅ 全部完成，耗时 {dur}s"
  done_fail: "🔗 **Pipeline** `{id}` ❌ 失败，耗时 {dur}s\n{error}"
  detail_line: "> {icon} {idx}. {agent}: {dur}s"
  turn: "🔗 `{id}` 💬 Turn {turn}: {icon} **{agent}** ({dur}s)\n{preview}"

# ── Job ───────────────────────────────────────────
job:
  summary_ok: "📨 **{agent}** `{job_id}` ✅ Completed in {dur}s"
  summary_fail: "📨 **{agent}** `{job_id}`\n> ❌ {error}"
  tools_header: "🔧 **Tools**"
  tools_line: "> ✅ `{tool}`"
  result_header: "📄 **Result** — {agent} `{job_id}`"
  result_header_part: "📄 **Result** — {agent} `{job_id}` [{part}/{total}]"
  footer: "⏱️ {dur}s"

# ── Agent Status ──────────────────────────────────
agent:
  session_expired: "⚠️ 会话已过期，已自动创建新会话（之前的对话上下文已丢失）"
  pool_exhausted: "🚫 {agent} 繁忙，请稍后重试 ({detail})"
  agent_error: "❌ {agent} 错误: {error}"
  agent_timeout: "⏰ {agent} 超时 (idle {timeout}s)"
  agent_crashed: "💥 {agent} 崩溃: {error}"

# ── Reusable Components ──────────────────────────
components:
  separator: "━━━━━━━━━━━━━━━━━━━━"
  timestamp: "🕐 {time}"

# ── Global Settings ──────────────────────────────
settings:
  text_limit: 1900
  chunk_overlap: 50
  collapse_threshold: 800
  summary_lines: 5

# ── Prompt Suffix ────────────────────────────────
# Appended to every agent prompt (pipeline steps, async jobs, etc.)
# Controls output verbosity at the Bridge level — all agents see this.
prompt_suffix: "\n\n[IMPORTANT: Be concise. Summarize your result in a few sentences. Do not output verbose logs, full file contents, or lengthy explanations. 请言简意赅地总结结果。]"

# ── Heartbeat ────────────────────────────────────
# Static prefix: byte-identical across rounds → cacheable by LLM KV cache.
# Dynamic suffix template: filled with live env data each round.
# Variables: {agent_name}, {client}, {shared_workdir}, {agents_status}, {context}
heartbeat:
  static_prefix_zh: |
    [HEARTBEAT] 你是 '{agent_name}'，由 ACP Bridge 管理。
    与其他 agent 对话：{client} -a <agent_name> "<消息>"
    共享工作区：{shared_workdir}
      所有 agent 都可以在此目录读写文件进行协作。

    各 agent 擅长领域：
      kiro: AWS/DevOps/云架构/Shell脚本，响应快
      claude: 重构/调试/代码审查/复杂推理，质量高
      codex: 代码生成/自动化，全自动模式
      qwen: 编码/调试/中文理解，性价比高
      hermes: 消息/IM集成/多语言
      harness: 轻量沙箱任务/工具调用/快速验证

    规则：
    - 如果没什么要做的，回复：[SILENT]
    - 鼓励与其他 agent 交流协作、互相学习
    - 保持简洁
  static_prefix_en: |
    [HEARTBEAT] You are '{agent_name}', managed by ACP Bridge.
    You can talk to other agents via: {client} -a <agent_name> "<message>"
    Shared workspace: {shared_workdir}
      All agents can read/write here for collaboration.

    Agent specialties:
      kiro: AWS/DevOps/cloud/shell scripting, fast response
      claude: refactoring/debugging/code review/complex reasoning, high quality
      codex: code generation/automation, full-auto mode
      qwen: coding/debugging/Chinese, cost-effective
      hermes: messaging/IM integration/multilingual
      harness: lightweight sandbox/tool calls/quick validation

    Rules:
    - If nothing to do, reply exactly: [SILENT]
    - Feel free to collaborate with and learn from other agents
    - Keep responses concise
  dynamic_suffix: |
    <env-update>
    Online agents:
    {agents_status}

    {context}
    </env-update>
