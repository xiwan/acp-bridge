name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv tool run ruff check .
      - run: uv tool run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run pytest -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        run: |
          PATTERN='(ACP_BRIDGE_TOKEN|OPENCLAW_TOKEN|LITELLM_API_KEY|ANTHROPIC_API_KEY|AWS_SECRET_ACCESS_KEY)=.{8,}'
          if git diff origin/main...HEAD -- . ':!.env*' | grep -iEq "$PATTERN"; then
            echo "❌ Potential secrets in diff"
            exit 1
          fi
          echo "✅ Clean"

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency
        run: |
          V=$(cat VERSION | tr -d '[:space:]')
          for f in README.md skill/SKILL.md; do
            grep -q "$V" "$f" || { echo "❌ $f missing version $V"; exit 1; }
          done
          echo "✅ Version $V consistent"
