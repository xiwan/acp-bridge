server:
  host: "0.0.0.0"
  port: 18010
  session_ttl_hours: 1
  shutdown_timeout: 30
  public_workdir: "/tmp/acp-public"
  upload_dir: "/tmp/acp-uploads"
  ui: true

pool:
  max_processes: 12
  max_per_agent: 3
  memory_limit_percent: 75

harness:
  binary: ""

webhook:
  # OpenClaw (commented out)
  url: "http://10.0.1.79:18789/tools/invoke"
  token: "${OPENCLAW_TOKEN}"
  format: "openclaw"
  account_id: "default"
  discord_target: "channel:1469723146134356173"

  # Hermes Agent (via webhook adapter)
  # url: "http://127.0.0.1:8644/webhooks/acp-result"
  # format: "generic"
  # secret: "${HERMES_WEBHOOK_SECRET}"
  # account_id: "default"
  # target: "channel:1494236555592732814"

s3:
  bucket: "benxiwan-acp-bridge-bucket"
  prefix: "acp-bridge/files"
  presign_expires: 3600

heartbeat:
  enabled: true
  interval: 60
  language: "zh"
  active_hours: [10, 22]
  timezone_offset: 8

# Persist every prompt actually sent to an agent (job/pipeline/heartbeat) for
# post-mortem and replay. See docs/api-reference.md for /pipelines/{id}/prompts
# and /admin/prompts endpoints.
prompt_log:
  enabled: true
  redact_secrets: true
  max_size: 1048576
  retention_days: 30

security:
  auth_token: "${ACP_BRIDGE_TOKEN}"
  rate_limit: 200
  rate_window: 60
  allowed_ips:
    - "127.0.0.1"
    - "172.16.0.0/12"
    - "172.18.0.1"
    - "34.210.86.68"
    - "10.0.1.79"
    - "100.23.57.226"
    - "10.0.1.86"

litellm:
  url: "http://localhost:4000"
  required_by: ["codex", "qwen", "opengame", "harness"]
  env:
    LITELLM_API_KEY: "${LITELLM_API_KEY}"

agents:
  kiro:
    enabled: true
    mode: "acp"
    command: "kiro-cli"
    acp_args: ["acp", "--trust-all-tools"]
    working_dir: "/home/ec2-user/projects/acp-bridge"
    description: "Kiro CLI agent"
    heartbeat: true
    capabilities:
      domains: ["devops", "cloud", "terminal"]
      tools: ["bash", "shell", "kubectl", "helm", "terraform"]
      languages:
        shell: true
        yaml: true
        json: true
      max_complexity: 20
      tags: ["cli-first", "low-latency"]
      version: "1.2.0"
      timeout: 30
      cost_per_million_tokens: 0.0
    metadata:
      author: {name: "AWS", url: "https://kiro.dev"}
      license: "Apache-2.0"
      programming_language: "TypeScript"
      natural_languages: ["en"]
      domains: ["coding", "devops", "cloud"]
      tags: ["agentic-ide", "spec-driven", "aws"]
      links:
        - {type: "source-code", url: "https://github.com/aws/kiro-cli"}
        - {type: "homepage", url: "https://kiro.dev"}
  claude:
    enabled: true
    mode: "acp"
    command: "claude-agent-acp"
    acp_args: []
    working_dir: "/tmp/cc"
    description: "Claude Code agent (via ACP adapter)"
    heartbeat: true
    capabilities:
      domains: ["coding", "refactoring", "debugging"]
      tools: ["read_file", "write_file", "code_search", "bash", "shell"]
      languages:
        python: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        javascript: ["ES2020", "ES2021", "ESNext"]
        typescript: true
        rust: ["1.70+"]
      max_complexity: 100
      tags: ["expensive", "high-accuracy", "slow-response"]
      version: "2.5.1"
      timeout: 60
      cost_per_million_tokens: 1.25
    metadata:
      author: {name: "Anthropic", url: "https://anthropic.com"}
      license: "MIT"
      programming_language: "TypeScript"
      natural_languages: ["en"]
      domains: ["coding", "refactoring", "debugging"]
      tags: ["agentic-cli", "claude-sonnet", "terminal"]
      links:
        - {type: "source-code", url: "https://github.com/anthropics/claude-code"}
        - {type: "documentation", url: "https://docs.anthropic.com/en/docs/claude-code"}
  codex:
    enabled: true
    mode: "acp"
    command: "codex-acp"
    acp_args: []
    working_dir: "/tmp/cx"
    description: "OpenAI Codex CLI agent (via ACP adapter)"
    heartbeat: true
    env:
      OPENAI_API_KEY: "${LITELLM_API_KEY}"
      OPENAI_BASE_URL: "http://localhost:8787/v1"
    metadata:
      author: {name: "OpenAI", url: "https://openai.com"}
      license: "Apache-2.0"
      programming_language: "Rust"
      natural_languages: ["en"]
      domains: ["coding", "automation", "code-review"]
      tags: ["agentic-cli", "open-source", "terminal"]
      links:
        - {type: "source-code", url: "https://github.com/openai/codex"}
  trae:
    enabled: true
    mode: "pty"
    command: "trae-cli"
    args: ["run", "--config-file", "/home/ec2-user/projects/trae-agent/trae_config.yaml", "--console-type", "simple", "--working-dir", "/home/ec2-user/projects/agent-space"]
    working_dir: "/tmp/ta"
    description: "Trae Agent — LLM-based CLI agent (via LiteLLM/Bedrock)"
    heartbeat: false
    idle_timeout: 300
    max_duration: 600
    metadata:
      author: {name: "ByteDance", url: "https://github.com/bytedance"}
      license: "MIT"
      programming_language: "Python"
      natural_languages: ["en", "zh"]
      domains: ["coding", "automation"]
      tags: ["agentic-cli", "open-source", "terminal"]
      links:
        - {type: "source-code", url: "https://github.com/bytedance/trae-agent"}
  qwen:
    enabled: true
    mode: "acp"
    command: "qwen"
    acp_args: ["--acp"]
    working_dir: "/tmp/qw"
    idle_ttl: 0  # Bedrock disconnects idle connections; don't keep them
    description: "Qwen Code agent (Qwen3-Coder via Bedrock)"
    heartbeat: true
    capabilities:
      domains: ["coding", "debugging", "code-generation"]
      tools: ["read_file", "write_file", "bash"]
      languages:
        python: true
        javascript: true
        go: true
        rust: ["1.60+"]
      max_complexity: 80
      tags: ["low-cost", "fast"]
      version: "3-coder"
      timeout: 45
      cost_per_million_tokens: 0.07
    metadata:
      author: {name: "Alibaba Qwen Team", url: "https://qwenlm.github.io"}
      license: "Apache-2.0"
      programming_language: "TypeScript"
      natural_languages: ["en", "zh"]
      domains: ["coding", "debugging", "code-generation"]
      tags: ["agentic-cli", "open-source", "qwen3-coder"]
      links:
        - {type: "source-code", url: "https://github.com/QwenLM/qwen-code"}
        - {type: "documentation", url: "https://qwenlm.github.io/qwen-code-docs"}
  opengame:
    enabled: true
    mode: "acp"
    command: "node"
    acp_args: ["/home/ec2-user/githubs/OpenGame/packages/cli/dist/index.js", "--acp", "--yolo"]
    working_dir: "/tmp/opengame"
    idle_ttl: 0
    idle_timeout: 900
    description: "OpenGame - AI-powered web game generator from a prompt"
    heartbeat: false
    env:
      QWEN_CODE_NO_RELAUNCH: "1"
      OPENAI_API_KEY: "${LITELLM_API_KEY}"
      OPENAI_BASE_URL: "http://localhost:8787/v1"
      OPENAI_MODEL: "bedrock/anthropic.claude-sonnet-4-6"
      OPENGAME_REASONING_PROVIDER: "openai-compat"
      OPENGAME_REASONING_API_KEY: "${LITELLM_API_KEY}"
      OPENGAME_REASONING_BASE_URL: "http://localhost:8787/v1"
      OPENGAME_REASONING_MODEL: "bedrock/anthropic.claude-sonnet-4-6"
    metadata:
      author: {name: "OpenGame Team", url: "https://github.com/leigest519/OpenGame"}
      license: "Apache-2.0"
      programming_language: "TypeScript"
      natural_languages: ["en", "zh"]
      domains: ["game-generation", "web-games", "creative"]
      tags: ["opengame", "h5-game", "ai-generation"]
      links:
        - {type: "source-code", url: "https://github.com/leigest519/OpenGame"}
  opencode:
    enabled: true
    mode: "acp"
    command: "/home/ec2-user/.opencode/bin/opencode"
    acp_args: ["acp"]
    working_dir: "/tmp/oc"
    description: "OpenCode agent (open source, multi-provider)"
    heartbeat: true
    idle_timeout: 300
    env:
      CLAUDE_CODE_USE_BEDROCK: ""
      OPENAI_BASE_URL: "http://localhost:8787/v1"
      OPENAI_API_KEY: "sk-litellm-bedrock"
    metadata:
      author: {name: "OpenCode AI", url: "https://opencode.ai"}
      license: "MIT"
      programming_language: "Go"
      natural_languages: ["en"]
      domains: ["coding", "multi-provider", "terminal"]
      tags: ["agentic-cli", "open-source", "provider-agnostic"]
      links:
        - {type: "source-code", url: "https://github.com/opencode-ai/opencode"}
        - {type: "homepage", url: "https://opencode.ai"}
  hermes:
    enabled: true
    mode: "acp"
    command: "hermes"
    acp_args: ["acp"]
    working_dir: "/tmp/ha"
    description: "Hermes Agent (open source, multi-provider)"
    heartbeat: true
    metadata:
      author: {name: "Nous Research", url: "https://nousresearch.com"}
      license: "MIT"
      programming_language: "Python"
      natural_languages: ["en", "zh"]
      domains: ["coding", "multi-provider", "messaging"]
      tags: ["agentic-cli", "open-source", "provider-agnostic"]
      links:
        - {type: "source-code", url: "https://github.com/NousResearch/hermes-agent"}
        - {type: "homepage", url: "https://hermesagent.org.cn"}
  harness:
    enabled: true
    mode: "acp"
    command: "harness-factory"
    acp_args: []
    working_dir: "/tmp/hf"
    description: "Harness Factory lite agent (profile-driven)"
    heartbeat: true
    profile:
      tools:
        fs: { permissions: [read, write, list, search] }
        shell: { allowlist: [echo, ls, cat, date, aws, curl] }
      orchestration: free
      resources:
        timeout: 120s
        max_turns: 100
        log_level: debug
        skills_dir: "/tmp/hf/skills"
      agent:
        model: "bedrock/deepseek.v3.2"
        litellm_url: "http://localhost:8787"
        litellm_api_key: "${LITELLM_API_KEY}"
        system_prompt: "You are a helpful assistant. Use tools when needed. Be concise."
        temperature: 0.3
